<!DOCTYPE html>
<html>
<head>
<title>Lord Venkateswara</title>

<style>

body{
margin:0;
font-family:Arial;
background:#d9d5cc;
text-align:center;
}

/* HEADER */
header{
background:#8B0000;
color:white;
padding:25px 0 10px 0;
}

header h1{
margin:0;
font-size:32px;
}

/* NAVIGATION */
nav{
margin-top:15px;
}

nav a{
color:white;
text-decoration:none;
margin:0 25px;
font-size:18px;
}

nav a:hover{
text-decoration:underline;
}

/* SECTION */
section{
padding:50px 20px;
}

/* GALLERY TITLE */
.gallery-title{
color:#7a0000;
font-size:34px;
margin-bottom:40px;
}

/* GALLERY GRID */
.gallery{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.gallery img{
width:320px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.3);
transition:0.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.popup img{
max-width:80%;
max-height:80%;
border-radius:10px;
}

.close{
position:absolute;
top:25px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Lord Venkateswara</h1>

<nav>
<a href="#">Home</a>
<a href="#">History</a>
<a href="#">Bhajans</a>
<a href="#">Gallery</a>
</nav>

</header>

<section>

<h2 class="gallery-title">Gallery</h2>

<div class="gallery">

<img src="img1.jpg" onclick="openImg(this.src)">
<img src="img2.jpg" onclick="openImg(this.src)">
<img src="img3.jpg" onclick="openImg(this.src)">

</div>

</section>

<div class="popup" id="popup">
<span class="close" onclick="closeImg()">×</span>
<img id="popupImg">
</div>

<script>

function openImg(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;
}

function closeImg(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
